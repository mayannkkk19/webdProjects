<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    
    <p>Rock Paper Scissors</p>
    <button
      onclick="

			gameResult('Rock');

			"
    >
      Rock
    </button>
    <button
      onclick="

			gameResult('Paper');
		
		"
    >
      Paper
    </button>
    <button
      onclick="

			gameResult('Scissor');

		"
    >
      Scissor
    </button>

    <p class="result"></p>
    <p class="scorePara"></p>


    <button
      onclick="
			score.wins = 0;
			score.ties = 0;
			score.loses = 0;
      localStorage.removeItem('score');
		"
    >
      Reset Score
    </button>

    <script>
      let score = JSON.parse(localStorage.getItem('score'));

      if(score === null){
        score = {
          wins : 0,
          loses : 0,
          ties : 0
        }
      }
      
      function pickComputerMove() {
        let randomNumber = Math.random();

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "Paper";
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = "Scissor";
        }

        return computerMove;
      }

      /*********************************************************/

      function gameResult(userPick) {
        let computerMove = pickComputerMove();
        let result;

        if (userPick === "Scissor") {
          if (computerMove === "Scissor") {
            result = "Tie";
            score.ties++;
          } else if (computerMove === "Rock") {
            result = "You lose";
            score.loses++;
          } else if (computerMove === "Paper") {
            result = "You win";
            score.wins++;
          }
        } else if (userPick === "Rock") {
          if (computerMove === "Rock") {
            result = "Tie";
            score.ties++;
          } else if (computerMove === "Paper") {
            result = "You lose";
            score.loses++;
          } else if (computerMove === "Scissor") {
            result = "You win";
            score.wins++;
          }
        } else if (userPick === "Paper") {
          if (computerMove === "Rock") {
            result = "You win";
            score.wins++;
          } else if (computerMove === "Paper") {
            result = "Tie";
            score.ties++;
          } else if (computerMove === "Scissor") {
            result = "You lose";
            score.loses++;
          }
        }

        localStorage.setItem('score', JSON.stringify(score));

        const showResult = document.querySelector('.result');
        let showScore = document.querySelector('scorePara');

        showResult.innerText = `${result}`;

        showScore.innerHTML = `Wins : ${score.wins}, Loses : ${score.loses}, Ties : ${score.ties}`;
      }
    </script>
  </body>
</html>
