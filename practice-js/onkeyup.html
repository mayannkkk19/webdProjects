<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" class="js-input-text" onkeyup="displayText();">
    <p class="js-display"></p>
    <script>
        function displayText () {
            let text = document.querySelector('.js-input-text').value;
            
            let display = document.querySelector('.js-display');
            display.innerHTML = `<h1>${text}</h1>`;
        }
    </script>
</body>
</html>
